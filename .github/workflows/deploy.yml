name: Build & Deploy to AWS App Runner

# Architecture: GitHub Actions CI/CD -> Amazon ECR -> AWS App Runner.
# App Runner has auto_deployments_enabled, so pushing a new image to the watched
# tag is itself the deploy.

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ds02-demand-forecasting
  IMAGE_TAG: latest

permissions:
  id-token: write   # request the OIDC token used to assume the deploy role
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch==2.9.1
          pip install -r requirements.txt

      # The serving image needs a trained checkpoint + clean.csv. For a DEMO we
      # regenerate them from synthetic data. For a REAL deploy, replace this step
      # with `aws s3 cp` of your production artifacts from the curated/artifacts
      # buckets (see docs/DEPLOYMENT.md).
      - name: Generate serving artifacts (synthetic demo)
        run: python run_all.py --synthetic --epochs 5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:${{ github.sha }}"

      - name: Done
        run: echo "Image pushed. App Runner auto-deploys the '$IMAGE_TAG' tag."
